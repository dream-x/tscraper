groups:
  - name: tscraper
    rules:
      - alert: ScraperDisconnected
        expr: tscraper_connected == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "TScraper disconnected from Telegram"
          description: "The scraper has been disconnected for more than 2 minutes."

      - alert: ScraperHighFailRate
        expr: >
          rate(tscraper_messages_failed_total[5m])
          / (rate(tscraper_messages_forwarded_total[5m]) + rate(tscraper_messages_failed_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TScraper message failure rate > 10%"
          description: "More than 10% of messages failed to forward in the last 5 minutes."

      - alert: ScraperNoMessages
        expr: >
          increase(tscraper_messages_received_total[30m]) == 0
          and tscraper_connected == 1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "TScraper receiving no messages"
          description: "No messages received in the last 30 minutes while connected."

      - alert: ScraperFrequentReconnects
        expr: increase(tscraper_reconnects_total[10m]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "TScraper reconnecting too frequently"
          description: "More than 5 reconnection attempts in the last 10 minutes."
